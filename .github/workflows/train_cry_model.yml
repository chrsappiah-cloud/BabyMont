name: Train Cry Model

on:
  push:
    paths:
      - "data/**"
      - "ml/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/train_cry_model.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      MODEL_UPDATE_TOKEN: ${{ secrets.BABYMONT_MODEL_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Train or generate model
        run: |
          source .venv/bin/activate
          bash ml/run_model_pipeline.sh

      - name: Upload generated model artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryDetector-model
          path: |
            BabyMont/Resources/Models/CryDetector.mlmodel
            BabyMont/Resources/Models/CryDetector.preprocessing.json
          if-no-files-found: error

      - name: Open pull request with generated model
        if: ${{ env.MODEL_UPDATE_TOKEN != '' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.MODEL_UPDATE_TOKEN }}
          commit-message: "ci: rebuild CryDetector.mlmodel"
          title: "ci: rebuild CryDetector.mlmodel"
          body: |
            Automated model refresh generated by the BabyMont training workflow.

            This PR keeps the compiled Core ML model out of direct protected-branch writes while preserving CI review gates.
            Add the repository secret `BABYMONT_MODEL_PAT` with repo/workflow permissions to allow model PR creation.
          branch: automation/rebuild-cry-detector
          delete-branch: true
          add-paths: |
            BabyMont/Resources/Models/CryDetector.mlmodel
            BabyMont/Resources/Models/CryDetector.preprocessing.json
