name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_file(path); puts "ok #{path}" }'

      - name: Compile Python sources
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          for source in list(Path("apns_provider").rglob("*.py")) + list(Path("ml").rglob("*.py")):
              py_compile.compile(str(source), doraise=True)
          PY

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: apns_provider
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: apns_provider
        run: pytest -q

  xcode-build:
    name: Xcode Build
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT: BabyMont.xcodeproj
      SCHEME: BabyMont
      CONFIGURATION: Debug
      DERIVED_DATA_PATH: build/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project "$PROJECT"

      - name: Build app and test bundles
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO
