name: Xcode CI

on:
  push:
    paths:
      - "BabyMont/**"
      - "BabyMontTests/**"
      - "BabyMontUITests/**"
      - "BabyMont.xcodeproj/**"
      - ".github/workflows/xcode_ci.yml"
  pull_request:
    paths:
      - "BabyMont/**"
      - "BabyMontTests/**"
      - "BabyMontUITests/**"
      - "BabyMont.xcodeproj/**"
      - ".github/workflows/xcode_ci.yml"
  workflow_dispatch:
    inputs:
      run_ui_tests:
        description: "Run UI tests as well as unit tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_unit_tests:
        description: "Launch simulator and run unit tests"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: xcode-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build BabyMont and Test Bundles
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT: BabyMont.xcodeproj
      SCHEME: BabyMont
      CONFIGURATION: Debug
      DERIVED_DATA_PATH: build/DerivedData
      RESULT_BUNDLE_PATH: build/TestResults.xcresult

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project "$PROJECT"

      - name: Build app for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build test bundles
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

  simulator-tests:
    name: Simulator Tests
    runs-on: macos-latest
    needs: build
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_unit_tests == 'true' }}

    env:
      PROJECT: BabyMont.xcodeproj
      SCHEME: BabyMont
      CONFIGURATION: Debug
      DERIVED_DATA_PATH: build/DerivedData
      RESULT_BUNDLE_PATH: build/TestResults.xcresult

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve first available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          DEVICE_NAME="$(xcrun simctl list devices available | sed -n 's/.*\(iPhone [^(]*\) (.*/\1/p' | head -n 1 | xargs)"
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE_NAME"

      - name: Run unit tests
        timeout-minutes: 15
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -only-testing:BabyMontTests \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI tests
        if: ${{ inputs.run_ui_tests == 'true' }}
        timeout-minutes: 15
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -only-testing:BabyMontUITests \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath build/UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BabyMont-TestResults
          path: |
            build/TestResults.xcresult
            build/UITestResults.xcresult
          if-no-files-found: ignore
